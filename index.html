<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April 2026 Kalender – Zähler</title>

<!-- ======================================================
     ALLES IN EINER DATEI (GitHub Pages READY)
     ====================================================== -->
<style>

/* Grundlayout – mobil optimiert */
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f8;
    padding: 12px;
}

h1 {
    text-align: center;
    margin: 10px 0 15px 0;
    font-size: 22px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 12px;
    border-radius: 12px;
}

/* Kalender-Gitter */
.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

/* Wochentage */
.weekday {
    text-align: center;
    font-weight: bold;
    font-size: 13px;
    padding: 6px 0;
    background: #e9edf1;
    border-radius: 6px;
}

/* Tagesfeld (groß und mobilfreundlich) */
.day {
    min-height: 85px;
    background: #fafafa;
    border-radius: 10px;
    border: 1px solid #e1e5ea;
    padding: 6px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    touch-action: manipulation;
}

/* Tagesnummer */
.date-number {
    font-size: 11px;
    color: #666;
    text-align: right;
}

/* Zähler (gut lesbar auf Handy) */
.counter {
    font-size: 30px;
    font-weight: bold;
    text-align: center;
}

/* Farbregeln */
.level-1 { background: #ef4444; color: white; }
.level-2 { background: #f97316; color: white; }
.level-3 { background: #facc15; }
.level-4 { background: #22c55e; color: white; }

/* Leere Felder vor dem 1. April */
.empty {
    background: transparent;
    border: none;
}

/* Großer Button (WhatsApp‑freundlich) */
.actions {
    margin-top: 15px;
    text-align: center;
}

button {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
}

button:active {
    transform: scale(0.98);
}

.info {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
}

</style>
</head>
<body>

<div class="container">

<h1>April 2026</h1>

<div class="calendar" id="calendar">
    <div class="weekday">Mo</div>
    <div class="weekday">Di</div>
    <div class="weekday">Mi</div>
    <div class="weekday">Do</div>
    <div class="weekday">Fr</div>
    <div class="weekday">Sa</div>
    <div class="weekday">So</div>
</div>

<div class="actions">
    <button onclick="copyLink()">Link mit meinem aktuellen Stand kopieren</button>
    <div class="info">Der Link enthält alle Werte und funktioniert auch über WhatsApp.</div>
</div>

</div>


<script>

/* ======================================================
   BASISDATEN
   ====================================================== */

const DAYS = 30;
const START_DAY = 2; // 1. April 2026 = Mittwoch (Mo=0, Di=1, Mi=2)

let counters = {};
let longPressTimer = null;


/* ======================================================
   URL WERTE LADEN
   ====================================================== */

function loadFromURL() {
    const params = new URLSearchParams(window.location.search);

    for (let i = 1; i <= DAYS; i++) {
        const v = params.get("d" + i);
        counters[i] = v !== null && !isNaN(v) ? Math.max(0, parseInt(v)) : 0;
    }
}


/* ======================================================
   KALENDER ERZEUGEN
   ====================================================== */

function createCalendar() {
    const calendar = document.getElementById("calendar");

    // Leere Felder vor dem 1. April
    for (let i = 0; i < START_DAY; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        calendar.appendChild(empty);
    }

    // Tage erzeugen
    for (let d = 1; d <= DAYS; d++) {

        const day = document.createElement("div");
        day.className = "day";
        day.dataset.day = d;

        /* ============================
           Klick = +1
           ============================ */
        day.addEventListener("click", () => increase(d));

        /* ============================
           Rechtsklick = -1 (Desktop)
           ============================ */
        day.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            decrease(d);
        });

        /* ============================
           Langes Drücken = -1 (Handy)
           ============================ */
        day.addEventListener("touchstart", () => {
            longPressTimer = setTimeout(() => decrease(d), 600);
        });

        day.addEventListener("touchend", () => clearTimeout(longPressTimer));
        day.addEventListener("touchmove", () => clearTimeout(longPressTimer));

        const date = document.createElement("div");
        date.className = "date-number";
        date.textContent = d + ".";

        const counter = document.createElement("div");
        counter.className = "counter";
        counter.id = "c" + d;
        counter.textContent = counters[d];

        day.appendChild(date);
        day.appendChild(counter);
        calendar.appendChild(day);

        updateColor(d);
    }
}


/* ======================================================
   WERT +1
   ====================================================== */

function increase(day) {
    counters[day]++;
    update(day);
}


/* ======================================================
   WERT -1 (nicht unter 0)
   ====================================================== */

function decrease(day) {
    counters[day] = Math.max(0, counters[day] - 1);
    update(day);
}


/* ======================================================
   ANZEIGE + FARBE AKTUALISIEREN
   ====================================================== */

function update(day) {
    document.getElementById("c" + day).textContent = counters[day];
    updateColor(day);
}


/* ======================================================
   FARBE JE NACH WERT
   ====================================================== */

function updateColor(day) {
    const el = document.querySelector(`[data-day='${day}']`);

    el.classList.remove("level-1","level-2","level-3","level-4");

    const v = counters[day];

    if (v === 1) el.classList.add("level-1");
    else if (v === 2) el.classList.add("level-2");
    else if (v === 3) el.classList.add("level-3");
    else if (v >= 4) el.classList.add("level-4");
}


/* ======================================================
   URL MIT ALLEN WERTEN ERZEUGEN
   ====================================================== */

function buildURL() {
    const base = window.location.origin + window.location.pathname;
    const params = new URLSearchParams();

    for (let i = 1; i <= DAYS; i++) {
        params.set("d" + i, counters[i]);
    }

    return base + "?" + params.toString();
}


/* ======================================================
   LINK IN ZWISCHENABLAGE KOPIEREN
   FUNKTIONIERT AUCH AUF SMARTPHONES
   ====================================================== */

function copyLink() {
    const url = buildURL();

    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => alert("Link kopiert"));
    } else {
        // Fallback für ältere Smartphones
        const input = document.createElement("input");
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        document.body.removeChild(input);
        alert("Link kopiert");
    }
}


/* ======================================================
   START
   ====================================================== */

loadFromURL();
createCalendar();

</script>

</body>
</html>
