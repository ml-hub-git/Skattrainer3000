<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Skat Training</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="inputs">
    <input id="inputA" placeholder="Partei A">
    <input id="inputB" placeholder="Partei B">
  </div>

  <div class="cards" id="cards"></div>

  <div class="skat" id="skat"></div>

  <div class="status">
    <div id="round"></div>
    <div id="result"></div>
  </div>

  <div class="buttons">
    <button id="start">Start</button>
    <button id="next">Weiter</button>
    <button id="solve">Lösen</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
